<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة التحكم — Fresh Up</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>

<header class="topbar">
  <div class="brand"><a href="/">Fresh <span>Up</span></a> · <span class="admin-tag">لوحة التحكم</span></div>
  <div class="actions"><a class="link" href="/" target="_blank">↗ عرض المنيو</a></div>
</header>

<aside class="sidebar">
  <div class="side-head">
    <div class="side-title">المنيوهات</div>
    <button id="addMenuBtn" class="btn-sm primary">+ منيو</button>
  </div>
  <ul id="menuList" class="menu-list"></ul>
</aside>

<main class="main">
  <div id="empty" class="empty">
    <div class="empty-icon">📋</div>
    <div>اختر منيو من القائمة الجانبية للبدء</div>
  </div>

  <div id="workspace" class="workspace" hidden>
    <div class="ws-head">
      <div>
        <h1 id="menuTitle">—</h1>
        <div class="ws-meta"><span id="catCount">0</span> قسم · <span id="prodCount">0</span> منتج</div>
      </div>
      <div class="ws-actions">
        <button class="btn outline" id="renameMenu">إعادة تسمية</button>
        <button class="btn danger" id="deleteMenu">حذف المنيو</button>
      </div>
    </div>

    <section class="card-block">
      <div class="block-head">
        <h2>الأقسام</h2>
        <button class="btn primary" id="addCat">+ قسم جديد</button>
      </div>
      <div id="catList" class="cat-list"></div>
    </section>
  </div>
</main>

<!-- Product modal -->
<div class="modal" id="productModal" hidden>
  <div class="modal-bg" data-close></div>
  <div class="modal-box">
    <header class="modal-head">
      <h3 id="prodModalTitle">منتج جديد</h3>
      <button class="x" data-close>×</button>
    </header>
    <form id="productForm" class="form">
      <input type="hidden" id="prodId">
      <input type="hidden" id="prodCatId">

      <label class="field">
        <span class="label">القسم الفرعي (اختياري)</span>
        <select id="prodSub"><option value="">— بدون —</option></select>
      </label>

      <label class="field">
        <span class="label">اسم المنتج <em>*</em></span>
        <input type="text" id="prodName" required maxlength="120">
      </label>

      <label class="field">
        <span class="label">السعر (ريال) <em>*</em></span>
        <input type="number" id="prodPrice" required min="0" step="0.5">
      </label>

      <label class="field">
        <span class="label">نبذة عن المنتج</span>
        <textarea id="prodDesc" rows="3" maxlength="400"></textarea>
      </label>

      <label class="field">
        <span class="label">صورة المنتج</span>
        <div class="image-pick">
          <div class="image-preview" id="prodImgPreview"><span>اختر صورة</span></div>
          <input type="file" id="prodImg" accept="image/*" hidden>
          <div class="image-pick-actions">
            <button type="button" class="btn outline sm" id="pickImgBtn">رفع صورة</button>
            <button type="button" class="btn outline sm danger" id="clearImg" hidden>إزالة</button>
          </div>
        </div>
      </label>

      <div class="form-actions">
        <button type="button" class="btn outline" data-close>إلغاء</button>
        <button type="submit" class="btn primary" id="saveProdBtn">حفظ</button>
      </div>
    </form>
  </div>
</div>

<!-- Prompt modal -->
<div class="modal" id="promptModal" hidden>
  <div class="modal-bg" data-close></div>
  <div class="modal-box small">
    <header class="modal-head">
      <h3 id="promptTitle">—</h3>
      <button class="x" data-close>×</button>
    </header>
    <form id="promptForm" class="form">
      <div id="promptFields"></div>
      <div class="form-actions">
        <button type="button" class="btn outline" data-close>إلغاء</button>
        <button type="submit" class="btn primary">حفظ</button>
      </div>
    </form>
  </div>
</div>

<!-- Confirm modal -->
<div class="modal" id="confirmModal" hidden>
  <div class="modal-bg" data-close></div>
  <div class="modal-box small">
    <header class="modal-head"><h3>تأكيد الحذف</h3></header>
    <div class="confirm-body">
      <p id="confirmMessage">هل أنت متأكد؟</p>
      <div class="form-actions">
        <button type="button" class="btn outline" data-close>إلغاء</button>
        <button type="button" class="btn danger" id="confirmYes">حذف</button>
      </div>
    </div>
  </div>
</div>

<div id="toast" class="toast" hidden></div>

<script type="module" src="js/admin.js"></script>
</body>
</html>
