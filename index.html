<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fresh Up</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box}
    html,body{margin:0;padding:0;height:100%}
    body{
      font-family:'Tajawal',system-ui,sans-serif;
      background:#ebe8dd;color:#042a2b;
      display:flex;align-items:center;justify-content:center;
      padding:24px;
    }
    .wrap{max-width:520px;width:100%;text-align:center}
    .logo{font-size:42px;font-weight:800;color:#042a2b;margin-bottom:6px;letter-spacing:-0.5px}
    .logo span{color:#025253}
    .tag{color:#025253;margin-bottom:32px;font-size:15px}
    .menus{display:grid;gap:12px}
    .menu-link{
      background:#fff;border:1px solid #e3dfd6;
      border-radius:16px;padding:18px 22px;
      font-size:18px;font-weight:700;color:#042a2b;
      text-decoration:none;display:flex;align-items:center;justify-content:space-between;
      transition:all 0.15s;
    }
    .menu-link:hover{background:#c7d78f;border-color:#c7d78f;transform:translateY(-1px)}
    .menu-link .arr{color:#025253;font-size:22px}
    .menu-link:hover .arr{color:#042a2b}
    .empty{
      color:#7a7567;background:#fff;border:1px dashed #c7c3b6;
      border-radius:16px;padding:32px 20px;font-size:14px;
    }
    .admin{
      margin-top:28px;display:inline-block;
      color:#025253;text-decoration:none;font-size:14px;
      padding:8px 16px;border:1px solid #025253;border-radius:999px;
    }
    .admin:hover{background:#025253;color:#fff}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo">Fresh <span>Up</span></div>
    <div class="tag">اختر المنيو</div>
    <div id="menus" class="menus"><div class="empty">جارٍ التحميل...</div></div>
    <a class="admin" href="admin.html">⚙️ لوحة التحكم</a>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js";
    import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-database.js";
    import { firebaseConfig } from "./js/firebase-config.js";

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    function escapeHtml(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);}

    try {
      const snap = await get(ref(db, 'menus'));
      const root = document.getElementById('menus');
      const menus = snap.val() ? Object.entries(snap.val()).map(([id,v]) => ({id, ...v})) : [];
      menus.sort((a,b) => (a.sort||0) - (b.sort||0));

      if (!menus.length) {
        root.innerHTML = '<div class="empty">لا توجد منيوهات بعد. توجّه إلى لوحة التحكم لإضافة منيو جديد.</div>';
      } else {
        root.innerHTML = menus.map(m =>
          `<a class="menu-link" href="menu.html?m=${encodeURIComponent(m.slug)}">
            <span>${escapeHtml(m.name)}</span>
            <span class="arr">←</span>
          </a>`
        ).join('');
      }
    } catch (e) {
      document.getElementById('menus').innerHTML =
        `<div class="empty">خطأ في الاتصال بـ Firebase.<br><small>${escapeHtml(e.message)}</small></div>`;
    }
  </script>
</body>
</html>
